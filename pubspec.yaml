name: evair_sim
description: EvairSIM - eSIM & Physical SIM Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Router
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0
  json_annotation: ^4.9.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  qr_flutter: ^4.1.0
  fl_chart: ^0.69.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  clipboard: ^0.1.3
  freezed_annotation: ^2.4.4

  # Functional Programming (Either pattern)
  fpdart: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.4
  freezed: ^2.5.7

  # App assets
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#FFFFFF"
    theme_color: "#FF6600"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/splash_logo.png
  color_dark: "#1C1C1E"
  image_dark: assets/icon/splash_logo.png
  android_12:
    image: assets/icon/splash_logo.png
    color: "#FFFFFF"
    image_dark: assets/icon/splash_logo.png
    color_dark: "#1C1C1E"
  ios: true
  android: true
  web: false
