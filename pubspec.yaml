name: evair_sim
description: EvairSIM — native shell hosting the H5 site (evair.zhhwxt.cn) inside a WebView. See docs/native-bridge-api.md for the JS↔Dart bridge the H5 can call.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # The entire app surface is rendered by H5 inside this WebView.
  # Override the URL with --dart-define=H5_URL=http://127.0.0.1:3000
  # for local development; defaults to production H5.
  flutter_inappwebview: ^6.1.5

  # Native bridges exposed to H5 via window.evair.*
  url_launcher: ^6.3.1   # openExternal()
  share_plus: ^10.1.2    # share()

  # Push notifications
  # ----------------------------------------------------------
  # firebase_core bootstraps the Firebase SDK (reads GoogleService-Info.plist
  # on iOS, google-services.json on Android).
  # firebase_messaging handles APNs (iOS) + FCM (Android) token lifecycle
  # and delivers remote notifications to the foreground/background.
  # flutter_local_notifications lets us render a banner while the app is
  # in the foreground (Firebase doesn't auto-show foreground pushes).
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # Misc
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # App assets / launcher icon / native splash
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#FFFFFF"
    theme_color: "#FF6600"

flutter_native_splash:
  # Keep the splash white on both light and dark system themes so the
  # orange / red Evair wordmark always reads on the brand's canonical
  # white background. Overriding `color_dark` to white prevents the
  # native launch screen from flipping to near-black in iOS / Android
  # dark mode (which made the logo appear on a black background).
  color: "#FFFFFF"
  image: assets/icon/splash_logo.png
  color_dark: "#FFFFFF"
  image_dark: assets/icon/splash_logo.png
  android_12:
    image: assets/icon/splash_logo.png
    color: "#FFFFFF"
    image_dark: assets/icon/splash_logo.png
    color_dark: "#FFFFFF"
  ios: true
  android: true
  web: false
